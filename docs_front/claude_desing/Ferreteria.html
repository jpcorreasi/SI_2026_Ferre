<!doctype html>
<html lang="es-CO" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#FFFFFF">
  <meta name="color-scheme" content="light dark">
  <title>Ferretería · Sistema interno</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
  <link rel="stylesheet" href="styles/tokens.css">
  <link rel="stylesheet" href="styles/app.css">
  <style>
    /* show/hide helpers for table vs cards */
    [data-show-md] { display: none !important; }
    [data-hide-md] { display: grid; }
    @media (min-width: 768px) {
      [data-show-md] { display: block !important; }
      [data-hide-md] { display: none !important; }
    }
    /* hamburger only on mobile */
    .topbar > .iconbtn:first-child { display: inline-grid; }
    @media (min-width: 768px) {
      .topbar > .iconbtn:first-child { display: none; }
    }
    .brand-text-md { display: none; }
    @media (min-width: 768px) {
      .brand-text-md { display: inline; }
    }
    /* Tweaks panel keeps using its own font, but inject our font where needed */
    body { font-family: "Inter", "Inter Variable", ui-sans-serif, system-ui, sans-serif; }
  </style>
</head>
<body>
  <div id="app"></div>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Data first -->
  <script src="data.js"></script>

  <!-- Tweaks shell -->
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <!-- Icons + primitives -->
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="ui.jsx"></script>
  <script type="text/babel" src="shell.jsx"></script>
  <script type="text/babel" src="screens.jsx"></script>
  <script type="text/babel" src="stub-screens.jsx"></script>

  <!-- App entrypoint -->
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
