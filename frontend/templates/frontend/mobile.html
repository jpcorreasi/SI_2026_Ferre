<!doctype html>
<html lang="es-co">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=5">
  <meta name="theme-color" content="#2563EB">
  <meta name="description" content="Ferretería — Punto de venta y gestión de inventario">
  <title>Ferretería — Sistema de Gestión</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    /* ── Design tokens (mirror /index.html so /m/ matches the SPA) ── */
    :root {
      --surface:         #FFFFFF;
      --surface-elevated:#FAFAFA;
      --surface-sunken:  #F4F4F5;

      --border:        #E4E4E7;
      --border-strong: #D4D4D8;

      --fg:        #18181B;
      --fg-muted:  #52525B;
      --fg-subtle: #71717A;

      --accent:        #2563EB;
      --accent-hover:  #1D4ED8;
      --accent-fg:     #FFFFFF;
      --accent-soft:   #DBEAFE;
      --accent-soft-fg:#1E40AF;

      --success:        #16A34A;
      --success-soft:   #DCFCE7;
      --success-soft-fg:#166534;
      --warning:        #B45309;
      --warning-soft:   #FEF3C7;
      --warning-soft-fg:#92400E;
      --danger:         #DC2626;
      --danger-soft:    #FEE2E2;
      --danger-soft-fg: #991B1B;
      --money:          #16A34A;

      --r-sm: 6px; --r-md: 8px; --r-lg: 12px; --r-xl: 16px;
      --sp-1: 4px;  --sp-2: 8px;  --sp-3: 12px; --sp-4: 16px;
      --sp-5: 20px; --sp-6: 24px; --sp-8: 32px;
      --elev-1: 0 1px 2px rgb(0 0 0 / 0.04);
      --elev-2: 0 4px 12px rgb(0 0 0 / 0.06);

      --hit-min: 44px;
      --hit-primary: 48px;

      /* Legacy aliases — feature blocks below were written against
         indigo/lavender/amber tokens before the harmonization;
         map them to the SPA palette so the visual story stays consistent. */
      --ink:           var(--fg);
      --ink-soft:      var(--fg-muted);
      --line:          var(--border-strong);
      --indigo:        var(--accent);
      --indigo-deep:   var(--accent-hover);
      --lavender:      var(--surface-elevated);
      --lavender-soft: var(--surface-sunken);
      --amber:         var(--accent);
      --amber-deep:    var(--accent-hover);
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      color: var(--fg);
    }
    body {
      background: var(--surface-sunken);
      -webkit-font-smoothing: antialiased;
      margin: 0;
    }

    /* ── Topbar (matches SPA #topbar) ─────────────────────────────── */
    .app-header {
      background: var(--surface);
      color: var(--fg);
      padding: 0 var(--sp-3);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: var(--sp-2);
      min-height: 56px;
      position: sticky; top: 0; z-index: 50;
    }
    .app-header h1 {
      font-size: 1.0625rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      flex: 1;
      margin: 0;
    }
    .app-header h1 .brand-mark {
      display: inline-grid;
      place-items: center;
      width: 28px; height: 28px;
      border-radius: var(--r-md);
      background: var(--accent);
      color: var(--accent-fg);
      font-weight: 700;
      font-size: 14px;
      margin-right: var(--sp-2);
      vertical-align: -7px;
    }

    .icon-btn {
      min-width: var(--hit-min);
      min-height: var(--hit-min);
      display: inline-grid;
      place-items: center;
      border-radius: var(--r-md);
      background: transparent;
      color: var(--fg-muted);
      border: 0;
      cursor: pointer;
      transition: background 120ms ease, color 120ms ease;
    }
    .icon-btn:hover { background: var(--surface-sunken); color: var(--fg); }
    .icon-btn:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    /* ── Tile (menu cards) ───────────────────────────────────────── */
    .card-tile {
      display: flex;
      align-items: center;
      gap: var(--sp-4);
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: var(--sp-4) var(--sp-5);
      font-size: 1rem;
      font-weight: 500;
      color: var(--fg);
      cursor: pointer;
      text-align: left;
      min-height: 64px;
      box-shadow: var(--elev-1);
      transition: border-color 120ms ease, box-shadow 120ms ease, background 120ms ease;
    }
    .card-tile:hover { border-color: var(--border-strong); box-shadow: var(--elev-2); }
    .card-tile:active { background: var(--surface-sunken); }
    .card-tile:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .card-tile svg { flex-shrink: 0; color: var(--accent); }
    .card-tile .tile-icon {
      display: inline-grid; place-items: center;
      width: 40px; height: 40px;
      border-radius: var(--r-md);
      background: var(--accent-soft); color: var(--accent-soft-fg);
      flex-shrink: 0;
    }
    .card-tile .tile-icon svg { color: inherit; width: 22px; height: 22px; }

    /* ── Form fields ─────────────────────────────────────────────── */
    .field-label {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--fg);
      margin-bottom: var(--sp-1);
      display: block;
    }
    .field-input {
      width: 100%;
      min-height: var(--hit-min);
      padding: 10px var(--sp-3);
      border: 1px solid var(--border-strong);
      border-radius: var(--r-md);
      font-size: 1rem;
      background: var(--surface);
      color: var(--fg);
      transition: border-color 120ms ease, box-shadow 120ms ease;
    }
    .field-input::placeholder { color: var(--fg-subtle); }
    .field-input:focus {
      outline: 0;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent) 20%, transparent);
    }
    .field-hint  { font-size: 0.75rem; color: var(--fg-subtle); margin-top: var(--sp-1); }
    .field-error { font-size: 0.875rem; color: var(--danger); margin-top: var(--sp-1); }

    /* ── Primary button (matches SPA .btn-primary / .login-btn) ──── */
    .btn-primary {
      background: var(--accent);
      color: var(--accent-fg);
      border: 0;
      border-radius: var(--r-md);
      min-height: var(--hit-primary);
      padding: 10px var(--sp-5);
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 120ms ease;
    }
    .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
    .btn-primary:disabled { opacity: 0.55; cursor: not-allowed; }
    .btn-primary:focus-visible {
      outline: 0;
      box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent) 30%, transparent);
    }

    .visually-hidden {
      position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }

    /* ── Login screen (mirrors SPA #login-screen) ────────────────── */
    .login-screen {
      min-height: 100dvh;
      display: flex; align-items: center; justify-content: center;
      padding: var(--sp-4);
      background: var(--surface-sunken);
    }
    .login-wrap { width: 100%; max-width: 400px; }
    .login-header { text-align: center; margin-bottom: var(--sp-6); }
    .login-brand-mark {
      width: 56px; height: 56px;
      border-radius: var(--r-lg);
      background: var(--accent); color: var(--accent-fg);
      display: grid; place-items: center;
      font-size: 24px; font-weight: 700;
      margin: 0 auto var(--sp-3);
      letter-spacing: -0.02em;
    }
    .login-header h1 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--fg);
      margin: 0;
    }
    .login-header p {
      color: var(--fg-muted);
      font-size: 0.875rem;
      margin-top: var(--sp-1);
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-xl);
      padding: var(--sp-6);
      box-shadow: var(--elev-2);
      display: flex; flex-direction: column;
      gap: var(--sp-4);
    }
    .login-card h2 {
      font-size: 1.125rem; font-weight: 600;
      color: var(--fg); margin: 0;
    }

    .toast {
      position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%);
      background: var(--ink); color: #fff; padding: 12px 18px;
      border-radius: 999px; font-size: 14px; z-index: 100;
      box-shadow: 0 8px 24px rgb(0 0 0 / 0.2);
    }
    .toast.toast-error { background: var(--danger); }

    /* ── Sales flow ────────────────────────────────────────────────── */
    .search-pill {
      display: flex; align-items: center; gap: 10px;
      background: var(--lavender); border-radius: 999px;
      padding: 10px 16px;
    }
    .search-pill input {
      flex: 1; border: 0; background: transparent; outline: none;
      font-size: 16px; min-height: 28px;
    }
    .search-pill button.clear {
      border: 0; background: transparent; cursor: pointer;
      min-width: 32px; min-height: 32px; color: var(--ink);
    }
    .result-list {
      background: var(--lavender); border-radius: 14px;
      padding: 6px 0; margin-top: 12px;
      max-height: 60vh; overflow-y: auto;
    }
    .result-list li { list-style: none; }
    .result-list button {
      width: 100%; text-align: left;
      padding: 14px 20px; background: transparent; border: 0;
      font-size: 16px; color: var(--ink); cursor: pointer;
      border-radius: 8px; min-height: var(--hit);
    }
    .result-list button:active { background: #C7D2FE; }
    .result-list .empty { padding: 20px; text-align: center; color: var(--ink-soft); font-size: 14px; }

    .customer-strip {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px; border-bottom: 1px solid #F3E8F0;
    }
    .customer-strip .label { font-size: 14px; color: var(--ink-soft); }
    .customer-strip .name { font-size: 16px; font-weight: 500; }

    .cart-row {
      display: grid;
      grid-template-columns: 1fr 110px 56px;
      align-items: center; column-gap: 8px;
      padding: 12px 0; border-bottom: 1px solid var(--line);
    }
    .cart-row .pname { font-size: 18px; font-weight: 500; }
    .cart-row .qty { font-size: 14px; color: var(--ink-soft); }
    .cart-row .price { font-size: 17px; color: var(--money); font-weight: 600; text-align: right; }
    .cart-row .trash {
      width: 44px; height: 44px; border-radius: 999px;
      background: var(--danger); color: #fff; border: 0;
      display: grid; place-items: center; cursor: pointer; justify-self: end;
    }
    .cart-row .trash:active { background: #991B1B; }

    .add-tile {
      width: 100%; min-height: 52px;
      border: 1px dashed var(--border-strong);
      border-radius: var(--r-md);
      background: var(--surface);
      color: var(--accent);
      display: grid; place-items: center;
      cursor: pointer; margin: var(--sp-4) 0;
      transition: background 120ms ease, border-color 120ms ease;
    }
    .add-tile:hover  { background: var(--accent-soft); border-color: var(--accent); }
    .add-tile:active { background: color-mix(in oklab, var(--accent-soft) 80%, var(--accent) 20%); }

    .product-row {
      display: grid; grid-template-columns: 1fr 64px; gap: 12px;
      align-items: center; padding: 14px 0; border-bottom: 1px solid var(--line);
    }
    .product-row .pname { font-size: 18px; font-weight: 600; }
    .product-row .pdesc { font-size: 13px; color: var(--ink-soft); }
    .product-row .pprice { font-size: 16px; color: var(--money); font-weight: 600; margin-top: 2px; }
    .product-row .add-cart {
      width: 56px; height: 56px; border-radius: 999px;
      background: var(--amber); color: var(--ink); border: 0;
      display: grid; place-items: center; cursor: pointer;
    }
    .product-row .add-cart:active { background: var(--amber-deep); }

    .total-row {
      display: flex; justify-content: space-between; align-items: baseline;
      padding: 14px 0; border-top: 2px solid var(--ink); margin-top: 12px;
    }
    .total-row .label { font-size: 22px; font-weight: 600; }
    .total-row .value { font-size: 22px; font-weight: 700; }

    /* Simplified: the wireframe's "Confirmar" knob+slider
       does not exist in the SPA. We render it as a flat primary button
       to match /index.html. The .knob span is hidden so existing HTML
       (which still contains it) stays valid. */
    .confirm-bar {
      display: block;
      margin-top: var(--sp-4);
    }
    .confirm-bar .knob { display: none; }
    .confirm-bar button {
      width: 100%;
      min-height: var(--hit-primary);
      padding: 10px var(--sp-5);
      background: var(--border-strong);
      color: var(--fg-muted);
      border: 0;
      border-radius: var(--r-md);
      font-size: 1rem;
      font-weight: 500;
      cursor: not-allowed;
      transition: background 120ms ease;
    }
    .confirm-bar.ready button {
      background: var(--accent);
      color: var(--accent-fg);
      cursor: pointer;
    }
    .confirm-bar.ready button:hover { background: var(--accent-hover); }
    .confirm-bar.busy { opacity: 0.6; pointer-events: none; }

    .select-field {
      width: 100%; min-height: var(--hit); padding: 12px 14px;
      border: 1px solid var(--line); border-radius: 10px;
      font-size: 16px; background: #fff; color: var(--ink);
      appearance: none;
      background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l5 5 5-5' stroke='%231F2937' stroke-width='2' fill='none' stroke-linecap='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat; background-position: right 14px center;
    }
    .select-field:focus { outline: 2px solid var(--indigo); border-color: var(--indigo); }

    /* ── Bottom sheet ──────────────────────────────────────────────── */
    .sheet-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      display: grid; place-items: end center;
      z-index: 200;
    }
    .sheet {
      width: 100%; max-width: 480px;
      background: var(--lavender);
      border-radius: 18px 18px 0 0;
      padding: 18px 18px 28px;
      max-height: 80vh; overflow-y: auto;
      box-shadow: 0 -8px 24px rgb(0 0 0 / 0.18);
    }
    @media (min-width: 768px) {
      .sheet-backdrop { place-items: center; }
      .sheet { border-radius: 18px; max-width: 360px; }
    }
    .sheet header {
      display: flex; align-items: center; justify-content: space-between;
      padding-bottom: 10px;
    }
    .sheet header h3 { font-size: 17px; font-weight: 600; }
    .sheet button.option {
      width: 100%; text-align: left; padding: 16px 8px;
      border: 0; background: transparent; border-top: 1px solid #C7D2FE;
      font-size: 17px; color: var(--ink); cursor: pointer; min-height: var(--hit);
    }
    .sheet button.option:first-of-type { border-top: 0; }
    .sheet button.option:active { background: #C7D2FE; }

    /* select-style trigger that opens the bottom-sheet */
    .sheet-trigger {
      width: 100%; min-height: var(--hit);
      padding: 12px 14px; border-radius: 999px;
      background: var(--lavender-soft); border: 0;
      display: flex; align-items: center; gap: 10px;
      font-size: 16px; color: var(--ink); cursor: pointer;
      text-align: left;
    }
    .sheet-trigger .chev { margin-left: auto; }
    .sheet-trigger.empty { color: #6B7280; }
    .sheet-trigger:focus-visible { outline: 2px solid var(--indigo); outline-offset: 2px; }

    /* ── Day pills (L M M J V S D) ─────────────────────────────────── */
    .day-pills { display: flex; justify-content: space-between; gap: 6px; }
    .day-pill {
      width: 44px; height: 44px; border-radius: 999px;
      background: #D1D5DB; color: #4B5563;
      border: 0; font-size: 18px; font-weight: 700; cursor: pointer;
      font-style: italic;
    }
    .day-pill[aria-pressed="true"] {
      background: var(--indigo); color: #fff;
    }
    .day-pill:focus-visible { outline: 3px solid var(--amber); outline-offset: 2px; }

    .time-cluster { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; align-items: end; }
    .time-cluster .field-label { text-align: center; }
    .time-cluster input { text-align: center; font-size: 22px; font-weight: 600; font-style: italic; }

    .form-section-title {
      font-size: 18px; font-weight: 600; text-align: center;
      margin: 20px 0 8px;
    }

    /* ── Stock list ────────────────────────────────────────────────── */
    .filter-pill {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 16px; border-radius: 999px;
      background: var(--lavender); color: var(--ink);
      border: 0; font-size: 14px; font-weight: 600; cursor: pointer;
      min-height: 38px;
    }
    .filter-pill:focus-visible { outline: 2px solid var(--indigo); outline-offset: 2px; }
    .filter-pill .count {
      background: var(--indigo); color: #fff; font-size: 11px;
      padding: 1px 7px; border-radius: 999px; font-weight: 700;
    }

    .stock-row {
      display: grid;
      grid-template-columns: 1fr auto 56px;
      align-items: center; column-gap: 12px;
      padding: 14px 0; border-bottom: 1px solid var(--line);
    }
    .stock-row .pname { font-size: 18px; font-weight: 600; }
    .stock-row .pmeta { font-size: 13px; color: var(--ink-soft); }
    .stock-row .pprice { font-size: 14px; color: var(--money); font-weight: 600; margin-top: 2px; }
    .stock-row .stock-badge {
      font-size: 16px; font-weight: 700; color: var(--money);
      text-align: right; white-space: nowrap;
    }
    .stock-row .stock-badge.low  { color: var(--warning); }
    .stock-row .stock-badge.out  { color: var(--danger); }
    .stock-row .edit-btn {
      width: 48px; height: 48px; border-radius: 12px;
      background: var(--amber); color: var(--ink); border: 0;
      display: grid; place-items: center; cursor: pointer; justify-self: end;
    }
    .stock-row .edit-btn:active { background: var(--amber-deep); }

    /* ── Stock counter (Bodega/Almacén-style +/-) ──────────────────── */
    .qty-stepper {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 12px;
    }
    .qty-stepper label { font-size: 16px; font-weight: 600; }
    .qty-stepper .value {
      background: #D1D5DB; color: var(--ink);
      font-size: 22px; font-weight: 700; text-align: center;
      padding: 8px; border-radius: 12px; border: 0;
      width: 100%; min-height: var(--hit);
      font-style: italic;
    }
    .qty-stepper .steps { display: grid; gap: 4px; }
    .qty-stepper .step-btn {
      width: 36px; height: 24px; border-radius: 8px;
      background: #E5E7EB; color: var(--ink); border: 0;
      display: grid; place-items: center; cursor: pointer;
    }
    .qty-stepper .step-btn:active { background: #D1D5DB; }

    /* ── PO Receive checkbox row ───────────────────────────────────── */
    .recv-row {
      display: grid;
      grid-template-columns: 1fr 110px 48px;
      align-items: center; column-gap: 8px;
      padding: 14px 0; border-bottom: 1px solid var(--line);
    }
    .recv-row .pname { font-size: 17px; font-weight: 500; }
    .recv-row .qty { font-size: 14px; color: var(--ink-soft); }
    .recv-row .price { font-size: 16px; color: var(--money); font-weight: 600; text-align: right; }
    .recv-row .chk {
      width: 36px; height: 36px; border-radius: 8px;
      border: 2px solid var(--ink); background: #fff;
      display: grid; place-items: center; cursor: pointer; justify-self: end;
      color: var(--ink);
    }
    .recv-row .chk[aria-pressed="true"] {
      background: var(--indigo); border-color: var(--indigo); color: #fff;
    }
    .recv-row .chk:focus-visible { outline: 2px solid var(--amber); outline-offset: 2px; }

    /* ── Supplier row ──────────────────────────────────────────────── */
    .supplier-row {
      display: grid;
      grid-template-columns: 1fr 56px;
      align-items: center; column-gap: 12px;
      padding: 14px 0; border-bottom: 1px solid var(--line);
      cursor: pointer;
    }
    .supplier-row .sname { font-size: 18px; font-weight: 600; }
    .supplier-row .smeta { font-size: 13px; color: var(--ink-soft); }
    .supplier-row .savatar {
      width: 48px; height: 48px; border-radius: 999px;
      background: var(--indigo); color: #fff;
      display: grid; place-items: center;
    }
    .supplier-row:active { background: var(--lavender-soft); }

    /* ── PO row (pendientes de recibir) ────────────────────────────── */
    .po-row {
      display: grid;
      grid-template-columns: 1fr 56px;
      align-items: center; column-gap: 12px;
      padding: 14px 0; border-bottom: 1px solid var(--line);
      cursor: pointer;
    }
    .po-row .savatar {
      width: 48px; height: 48px; border-radius: 999px;
      background: var(--indigo); color: #fff;
      display: grid; place-items: center;
    }

    /* ── KPI tiles (Caja balance) ──────────────────────────────────── */
    .kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .kpi {
      background: var(--lavender); border-radius: 14px;
      padding: 14px 16px;
    }
    .kpi .lbl { font-size: 12px; color: var(--ink-soft); font-weight: 500; }
    .kpi .val { font-size: 22px; font-weight: 700; margin-top: 2px; }
    .kpi.balance { background: #DCFCE7; }
    .kpi.balance .val { color: #166534; }
    .kpi.income  .val { color: var(--money); }

    function esc(s) {
      if (s === null || s === undefined) return '';
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');

    function toast(msg, kind) {
      document.querySelectorAll('.toast').forEach(t => t.remove());
      const el = document.createElement('div');

    // Single-flight refresh — if 401 hits multiple in-flight requests,
    // we refresh once and let them all retry with the new token.
    let _refreshPromise = null;
    async function refreshAccessToken() {
      if (_refreshPromise) return _refreshPromise;
      const refresh = localStorage.getItem(REFRESH_KEY);
      if (!refresh) throw new Error('no refresh token');
      _refreshPromise = (async () => {
        try {
          const res = await fetch('/api/token/refresh/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ refresh }),
          });
          if (!res.ok) throw new Error('refresh failed: ' + res.status);
          const d = await res.json();
          localStorage.setItem(TOKEN_KEY, d.access);
          if (d.refresh) localStorage.setItem(REFRESH_KEY, d.refresh);
          return d.access;
        } finally {
          _refreshPromise = null;
        }
      })();
      return _refreshPromise;
    }

    async function api(path, opts = {}, _retried = false) {
      opts.headers = Object.assign({}, opts.headers || {});
      const token = localStorage.getItem(TOKEN_KEY);
      if (token) opts.headers['Authorization'] = `Bearer ${token}`;
      if (opts.body && !(opts.body instanceof FormData)) {
        opts.headers['Content-Type'] = 'application/json';
        if (typeof opts.body !== 'string') opts.body = JSON.stringify(opts.body);
      }
      const res = await fetch(path, opts);

      // Auto-refresh on 401 once per call (skip the refresh endpoint itself)
      if (res.status === 401 && !_retried && !path.startsWith('/api/token/')) {
        try {
          await refreshAccessToken();
          // Body may have been consumed if it was a string; rebuild headers
          // since the Authorization header just changed.
          return api(path, opts, true);
        } catch (refreshErr) {
          // Refresh failed — clear session and bounce to login
          [TOKEN_KEY, REFRESH_KEY, USER_KEY, ROLE_KEY, FULLNAME_KEY].forEach(k => localStorage.removeItem(k));
          state.user = null; state.role = null; state.fullName = null;
          if (state.route !== 'login') navigate('login');
          const err = new Error('Session expired');
          err.status = 401; err.data = { detail: 'Sesión expirada. Inicia sesión nuevamente.' };
          throw err;
        }
      }

      const data = res.status === 204 ? null
        : (res.headers.get('content-type') || '').includes('application/json')
          ? await res.json() : await res.text();
      if (!res.ok) {
        const err = new Error('API error');
        err.status = res.status; err.data = data;
        throw err;
      }
      return data;
    }

    // ── Avatar helpers ──────────────────────────────────────────────────────
    const AVATAR_COLORS = [
      ['#EDE9FE', '#5B21B6'], // violet
      ['#DCFCE7', '#166534'], // green
      ['#FEE2E2', '#991B1B'], // red
      ['#DBEAFE', '#1E40AF'], // blue

    function avatarFor(name, seed) {
      const initial = (String(name || '?').trim().charAt(0) || '?').toUpperCase();
      const idx = Math.abs(Number(seed) || initial.charCodeAt(0)) % AVATAR_COLORS.length;
      const [bg, fg] = AVATAR_COLORS[idx];
      return `<span aria-hidden="true" style="display:grid;place-items:center;width:44px;height:44px;border-radius:999px;background:${bg};color:${fg};font-weight:600;font-size:18px;flex-shrink:0">${esc(initial)}</span>`;
    }

    // ── PDF download (JWT-aware, via Blob) ──────────────────────────────────
    async function downloadAsBlob(url, filename) {
      const token = localStorage.getItem(TOKEN_KEY);
      const res = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
      if (!res.ok) {
        const err = new Error('Download failed');
        err.status = res.status;
        try { err.data = await res.json(); } catch (_) {}
        throw err;
      }
      const blob = await res.blob();
      const objUrl = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = objUrl; a.download = filename || 'descarga.pdf';
      document.body.appendChild(a); a.click();
      setTimeout(() => { URL.revokeObjectURL(objUrl); a.remove(); }, 100);
    }

    function fmtDateTimeCO(iso) {
      if (!iso) return '—';
      try {
        const d = new Date(iso);
        return d.toLocaleString('es-CO', {
          year: 'numeric', month: '2-digit', day: '2-digit',
          hour: '2-digit', minute: '2-digit', hour12: false,
        });
      } catch (e) { return iso; }
    }

    function todayISO() {
      const d = new Date();
      const p = (n) => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;
    }

    function mondayOfThisWeekISO() {
      const d = new Date();
      const day = d.getDay();              // 0=Sun … 6=Sat
      const diff = day === 0 ? -6 : 1 - day; // shift back to Monday
      d.setDate(d.getDate() + diff);
      const p = (n) => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;
    }

    // ── Bottom-sheet helper ─────────────────────────────────────────────────
    // openSheet({ title, options: [{value, label}], onSelect: (opt) => void })
    function openSheet({ title, options, onSelect }) {
      closeSheet();
      const back = document.createElement('div');
      back.className = 'sheet-backdrop';
      back.setAttribute('role', 'dialog');
      back.setAttribute('aria-modal', 'true');
      back.setAttribute('aria-label', title || 'Selecciona una opción');
      back.innerHTML = `
        <div class="sheet">
          <header>
            <h3>${esc(title || '')}</h3>
            <button type="button" class="icon-btn" data-sheet-close aria-label="Cerrar">${ICONS.x}</button>
          </header>
          <div>
            ${options.map((o, i) => `
              <button type="button" class="option" data-sheet-pick data-idx="${i}">${esc(o.label)}</button>
            `).join('')}
          </div>
        </div>
      `;
      back._opts = options;
      back._onSelect = onSelect;
      document.body.appendChild(back);
      back.addEventListener('click', (e) => {
        if (e.target === back || e.target.closest('[data-sheet-close]')) {
          closeSheet();
          return;
        }
        const pick = e.target.closest('[data-sheet-pick]');
        if (pick) {
          const idx = parseInt(pick.dataset.idx, 10);
          const opt = back._opts[idx];
          closeSheet();
          if (typeof back._onSelect === 'function') back._onSelect(opt);
        }
      });
      // ESC to close
      document.addEventListener('keydown', sheetEscHandler);
    }
    function closeSheet() {
      document.querySelectorAll('.sheet-backdrop').forEach(s => s.remove());
      document.removeEventListener('keydown', sheetEscHandler);
    }
    function sheetEscHandler(e) {
      if (e.key === 'Escape') closeSheet();
    }

        return '$ ' + v.toFixed(0);

    function debounce(fn, ms) {
      let t;
      return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };

      return `

    function afterCantidad() {
      const p = state.cart.pending_product;
      if (!p) return;
      const input = $('#qty-input');
      const total = $('#qty-total');
      const err   = $('#qty-error');

      const recalc = () => {
        const q = parseInt(input.value, 10);

        total.textContent = fmtCOP(Number(p.sale_price) * q);
      };
      input.addEventListener('input', () => {
        err.hidden = true;
        recalc();
      });
      setTimeout(() => input.select(), 50);

    function afterConfirmarVenta() {
      const sel = $('#pm-select');
      if (sel) {
        sel.addEventListener('change', () => {
          const id = parseInt(sel.value, 10);
          const pm = (state.paymentMethods || []).find(p => p.id === id);
          state.cart.payment_method = pm || null;
          $('#pm-error').hidden = true;
        });

      // Lazy-load payment methods once
      if (!Array.isArray(state.paymentMethods)) {
        (async () => {
          try {
            const data = await api('/api/payment-methods/?page_size=100');
            state.paymentMethods = data.results || data;
            if (state.route === 'ventas/confirmar') render();

    // ── Cart actions ────────────────────────────────────────────────────────
    function cartSelectCustomer(id) {
      const c = _rows.customers[id];
      if (!c) return;
      state.cart.customer = { id: c.id, full_name: c.full_name };
      state.cart.is_anonymous = false;
      navigate('ventas/carrito');
    }

    function cartGoAnonymous() {
      state.cart.customer = null;
      state.cart.is_anonymous = true;
      navigate('ventas/carrito');
    }

    function cartPickProduct(id) {
      const p = _rows.products[id];
      if (!p) return;
      if (Number(p.stock) <= 0) { toast('Sin stock disponible.', 'error'); return; }
      state.cart.pending_product = p;
      navigate('ventas/cantidad');
    }

    function cartAcceptQty() {
      const p = state.cart.pending_product;
      if (!p) return;
      const input = $('#qty-input');
      const err   = $('#qty-error');
      const q = parseInt(input.value, 10);
      if (!q || q < 1) {
        err.textContent = 'La cantidad debe ser mayor a 0.';
        err.hidden = false; input.focus(); return;
      }
      if (q > Number(p.stock)) {
        err.textContent = `Stock insuficiente. Disponible: ${p.stock}.`;
        err.hidden = false; input.focus(); return;
      }
      // Merge if same product already in cart
      const existing = state.cart.items.find(it => it.product_id === p.id);
      if (existing) {
        const newQty = existing.quantity + q;
        if (newQty > Number(p.stock)) {
          err.textContent = `Stock insuficiente. Ya tienes ${existing.quantity}, disponible total: ${p.stock}.`;
          err.hidden = false; return;
        }
        existing.quantity = newQty;
      } else {
        state.cart.items.push({
          product_id: p.id,
          name: p.name,
          unit_price: p.sale_price,
          quantity: q,
        });
      }
      state.cart.pending_product = null;
      navigate('ventas/carrito');
    }

    function cartRemoveItem(idx) {
      state.cart.items.splice(idx, 1);
      render();
    }

    function cartGoConfirm() {
      if (state.cart.items.length === 0) {
        toast('Agrega al menos un producto.', 'error'); return;
      }
      if (!state.cart.customer && !state.cart.is_anonymous) {
        toast('Selecciona un cliente o "Venta al Público".', 'error'); return;
      }
      navigate('ventas/confirmar');
    }

    async function cartSubmitSale() {
      const c = state.cart;
      const bar = $('#confirm-bar');
      const errBox = $('#pm-error');

      if (!c.payment_method) {
        errBox.textContent = 'Selecciona un tipo de pago.';
        errBox.hidden = false;
        return;
      }
      if (bar) bar.classList.add('busy');
      const payload = {
        customer: c.customer ? c.customer.id : null,
        payment_method: c.payment_method.id,
        is_anonymous: !!c.is_anonymous,
        items: c.items.map(it => ({ product: it.product_id, quantity: it.quantity })),
      };
      try {
        const sale = await api('/api/sales/', { method: 'POST', body: payload });
        // Reset cart
        state.cart = { customer: null, is_anonymous: false, items: [], payment_method: null, pending_product: null };
        toast('Venta #' + sale.id + ' registrada por ' + fmtCOP(sale.total));
        navigate('menu');
      } catch (err) {
        if (bar) bar.classList.remove('busy');
        let msg = 'No se pudo registrar la venta.';
        if (err.data) {
          if (typeof err.data === 'string') msg = err.data;
          else if (err.data.detail) msg = err.data.detail;
          else if (Array.isArray(err.data.items) && err.data.items.length) {
            msg = String(err.data.items[0]);
          } else {
            const firstKey = Object.keys(err.data)[0];
            if (firstKey) msg = `${firstKey}: ${JSON.stringify(err.data[firstKey])}`;
          }
        }
        toast(msg, 'error');
      }
    }

    async function searchSalesForInvoice() {
      const date    = $('#fac-date').value;
      const tFrom   = $('#fac-time-from').value;
      const tTo     = $('#fac-time-to').value;
      const errBox  = $('#fac-error');
      errBox.hidden = true;

      state.invoiceFlow.date = date;

    // ── Emitir Factura: pantalla 2 — resultados ─────────────────────────────
    function viewFacturaResultados() {
      const f = state.invoiceFlow;
      if (!f.date) { navigate('emitir-factura'); return ''; }

      const loading = f.results === null;
      let body;
      if (loading) {
        body = `<li class="empty">Buscando…</li>`;
      } else if (f.results.length === 0) {
        body = `<li class="empty">Sin ventas en el rango seleccionado.</li>`;
      } else {
        body = f.results.map(s => {
          const d = new Date(s.sale_date);
          const hhmm = d.toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit', hour12: false });
          const name = s.customer_name || (s.is_anonymous ? 'Venta al Público' : '—');
          const badge = s.invoice_id
            ? `<span class="text-xs px-2 py-0.5 rounded-full" style="background:#DCFCE7;color:#166534">Ya facturada</span>`
            : '';
          return `
            <li>
              <button type="button" class="grid grid-cols-[auto_1fr_auto] items-center gap-3 w-full px-4 py-3 text-left rounded-lg"
                      data-action="pick-sale" data-id="${s.id}">
                ${avatarFor(name, s.id)}
                <div>
                  <div class="text-base">${esc(name)} ${badge}</div>
                  <div class="text-lg font-semibold" style="color: var(--money)">${fmtCOP(s.total)}</div>
                </div>
                <div class="text-xs text-gray-500">${esc(hhmm)}</div>
              </button>
            </li>
          `;
        }).join('');
      }

      const rangeLabel = (f.timeFrom || f.timeTo)
        ? `${esc(f.date)} · ${esc(f.timeFrom || '00:00')} – ${esc(f.timeTo || '23:59')}`
        : esc(f.date);

      return `
        <header class="app-header" role="banner">
          <button type="button" class="icon-btn" data-action="go" data-to="emitir-factura" aria-label="Volver">
            ${ICONS.back}
          </button>
          <h1>Resultados</h1>
        </header>
        <section class="px-4 py-4">
          <div class="flex items-center justify-between mb-3">
            <p class="text-sm text-gray-600">${rangeLabel}</p>
            <button type="button" class="icon-btn" data-action="go" data-to="emitir-factura" aria-label="Cerrar">${ICONS.x}</button>
          </div>
          <ul class="result-list" role="listbox" aria-label="Ventas encontradas">${body}</ul>
        </section>
      `;
    }

    async function afterFacturaResultados() {
      const f = state.invoiceFlow;
      if (f.results !== null) return;
      try {
        const data = await api(
          '/api/sales/?date_from=' + encodeURIComponent(f.date) +
          '&date_to=' + encodeURIComponent(f.date) +
          '&ordering=sale_date&page_size=100'
        );
        let rows = data.results || data;
        // Client-side hour filter (backend only filters by date).
        if (f.timeFrom || f.timeTo) {
          const inRange = (iso) => {
            const d = new Date(iso);
            const hhmm = String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
            if (f.timeFrom && hhmm < f.timeFrom) return false;
            if (f.timeTo   && hhmm > f.timeTo)   return false;
            return true;
          };
          rows = rows.filter(s => inRange(s.sale_date));
        }
        // Don't offer cancelled sales.
        rows = rows.filter(s => s.status !== 'CANCELLED');
        state.invoiceFlow.results = rows;
      } catch (err) {
        state.invoiceFlow.results = [];
        toast('Error al buscar ventas.', 'error');
      }
      if (state.route === 'emitir-factura/resultados') render();
    }

    function pickSaleForInvoice(saleId) {
      const f = state.invoiceFlow;
      const sale = (f.results || []).find(s => s.id === saleId);
      if (!sale) return;
      f.selectedSale = sale;
      navigate('emitir-factura/preview');
    }

    async function emitAndDownloadInvoice() {
      const sale = state.invoiceFlow.selectedSale;
      if (!sale) return;
      const btn = $('#dl-pdf');
      const errBox = $('#fac-preview-error');
      errBox.hidden = true;
      const original = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = `<span aria-hidden="true">${ICONS.doc}</span><span>Procesando…</span>`;

      try {
        let invoiceId = sale.invoice_id;
        if (!invoiceId) {
          const inv = await api('/api/customer-invoices/', {
            method: 'POST',
            body: { sale: sale.id },
          });
          invoiceId = inv.id;
          sale.invoice_id = invoiceId;
          toast('Factura #' + invoiceId + ' emitida.');
        }
        await downloadAsBlob(
          '/api/customer-invoices/' + invoiceId + '/pdf/',
          'factura-' + invoiceId + '.pdf'
        );
        // Refresh button label since invoice now exists.
        render();
      } catch (err) {
        let msg = 'No se pudo generar la factura.';
        if (err.data) {
          if (err.data.detail) msg = err.data.detail;
          else if (err.data.sale) msg = Array.isArray(err.data.sale) ? err.data.sale[0] : String(err.data.sale);
          else if (err.data.discount) msg = 'Descuento inválido: ' + err.data.discount;
          else {
            const k = Object.keys(err.data)[0];
            if (k) msg = `${k}: ${JSON.stringify(err.data[k])}`;
          }
        }
        errBox.textContent = msg;
        errBox.hidden = false;
        toast(msg, 'error');
      } finally {
        btn.disabled = false;
        btn.innerHTML = original;
      }
    }

    async function submitNuevoEmpleado() {
      const e = state.empleado;
      const errBox = $('#e-error');
      const bar    = $('#e-confirm');
      errBox.hidden = true;

      if (!e.full_name.trim())        return showFormErr(errBox, 'El nombre es requerido.');
      if (!e.document_type)           return showFormErr(errBox, 'Selecciona el tipo de documento.');
      if (!e.document_number.trim())  return showFormErr(errBox, 'El número de documento es requerido.');
      if (!e.position.trim())         return showFormErr(errBox, 'El cargo es requerido.');
      if (!e.hire_date)               return showFormErr(errBox, 'La fecha de contratación es requerida.');
      if (!e.base_salary)             return showFormErr(errBox, 'El salario base es requerido.');
      if (!e.username.trim())         return showFormErr(errBox, 'El usuario es requerido.');
      if ((e.password || '').length < 8) return showFormErr(errBox, 'La contraseña debe tener al menos 8 caracteres.');

      const hasDays = e.days.length > 0;
      const hasTimes = !!(e.start_time && e.end_time);
      if (hasDays && !hasTimes) return showFormErr(errBox, 'Indica hora de inicio y salida para el horario.');
      if (!hasDays && hasTimes) return showFormErr(errBox, 'Selecciona al menos un día para aplicar el horario.');
      if (hasTimes && e.end_time <= e.start_time) {
        return showFormErr(errBox, 'La hora de salida debe ser posterior a la de inicio.');
      }

      bar.classList.add('busy');
      let createdEmp;
      try {
        createdEmp = await api('/api/employees/', {
          method: 'POST',
          body: {
            full_name: e.full_name.trim(),
            document_type: e.document_type,
            document_number: e.document_number.trim(),
            phone: e.phone.trim(),
            position: e.position.trim(),
            hire_date: e.hire_date,
            base_salary: String(e.base_salary),
            username: e.username.trim(),
            password: e.password,
            is_active: true,
          },
        });
      } catch (err) {
        bar.classList.remove('busy');
        return showFormErr(errBox, apiErrorMessage(err, 'No se pudo crear el empleado.'));
      }

      // Optional: create the WorkSchedule for the current week.
      if (hasDays && hasTimes) {
        try {
          await api('/api/work-schedules/', {
            method: 'POST',
            body: {
              employee: createdEmp.id,
              week_start: mondayOfThisWeekISO(),
              notes: 'Horario regular cargado al crear el empleado.',
              shifts: e.days.map(d => ({
                day_of_week: d,
                start_time: e.start_time,
                end_time: e.end_time,
              })),
            },
          });
          toast('Empleado y horario creados.');
        } catch (err) {
          // Employee already created; just warn about the schedule.
          toast('Empleado creado; horario falló: ' + apiErrorMessage(err, ''), 'error');
        }
      } else {
        toast('Empleado "' + createdEmp.full_name + '" creado.');
      }

      // Reset
      state.empleado = {
        full_name: '', document_type: '', document_number: '',
        phone: '', position: '', hire_date: '', base_salary: '',
        username: '', password: '',
        days: [], start_time: '', end_time: '',
      };
      navigate('personas');
    }

    function showFormErr(box, msg) {

      box.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
    function apiErrorMessage(err, fallback) {
      if (!err || !err.data) return fallback;
      if (typeof err.data === 'string') return err.data;
      if (err.data.detail) return err.data.detail;
      const k = Object.keys(err.data)[0];
      if (!k) return fallback;
      const v = err.data[k];
      const txt = Array.isArray(v) ? v[0] : (typeof v === 'string' ? v : JSON.stringify(v));
      return `${k}: ${txt}`;
    }

          const label = $(`#${prefix}-doctype-label`);
          const btn   = $(`#${prefix}-doctype-btn`);
          if (label) label.textContent = opt.label;
          if (btn)   btn.classList.remove('empty');
        },
      });
    }

    function buildStockQS() {
      const p = new URLSearchParams();
      const f = state.stock.filters;
      if (state.stock.search.trim()) p.set('search', state.stock.search.trim());
      if (f.category)   p.set('category', f.category.id);
      if (f.min_price)  p.set('min_price', f.min_price);
      if (f.max_price)  p.set('max_price', f.max_price);
      if (f.is_active)  p.set('is_active', f.is_active);
      p.set('page_size', '50');

    async function loadStock() {

      if (!box) return;
      box.innerHTML = '<p class="text-center text-gray-500 py-6 text-sm">Cargando…</p>';

        const data = await api('/api/products/?' + buildStockQS());

        state.stock.results = rows;
        if (!rows.length) {
          box.innerHTML = '<p class="text-center text-gray-500 py-6 text-sm">Sin productos.</p>';
          return;
        }
        const isAdmin = (state.role === 'ADMIN');
        rows.forEach(p => { _rows.products[p.id] = p; });
        box.innerHTML = rows.map(p => {
          const cls = Number(p.stock) <= 0 ? 'out' :
                      (p.is_low_stock ? 'low' : '');
          return `

    function afterProductForm() {
      const form = $('#product-form');
      form.addEventListener('input', (e) => {
        const f = e.target;
        if (!f.name) return;
        if (f.name === 'stock' || f.name === 'min_stock') {
          state.productEdit[f.name] = Math.max(0, parseInt(f.value, 10) || 0);
        } else {
          state.productEdit[f.name] = f.value;

      });
      form.addEventListener('submit', (e) => {
        e.preventDefault();

      setTimeout(() => $('#p-name').focus(), 50);

    function stepStock(field, delta) {
      const input = field === 'stock' ? $('#p-stock') : $('#p-min');
      const next = Math.max(0, (parseInt(input.value, 10) || 0) + delta);
      input.value = next;
      state.productEdit[field] = next;
    }

        return;
      }
      openSheet({

          state.productEdit.category = cat ? { id: cat.id, name: cat.name } : null;
          const lbl = $('#p-cat-label'); const btn = $('#p-cat-btn');

    async function submitProduct() {
      const p = state.productEdit;
      const errBox = $('#p-error');
      const bar    = $('#p-confirm');
      errBox.hidden = true;

      if (!p.code.trim())          return showFormErr(errBox, 'El código es requerido.');
      if (!p.name.trim())          return showFormErr(errBox, 'El nombre es requerido.');
      if (!p.category)             return showFormErr(errBox, 'Selecciona una categoría.');
      if (!p.sale_price)           return showFormErr(errBox, 'El precio de venta es requerido.');
      if (Number(p.sale_price) <= 0) return showFormErr(errBox, 'El precio debe ser mayor a 0.');
      if (Number(p.stock) < 0)     return showFormErr(errBox, 'El stock no puede ser negativo.');

      const body = {
        code: p.code.trim(),
        name: p.name.trim(),
        description: p.description.trim(),
        category: p.category.id,
        sale_price: String(p.sale_price),
        stock: Number(p.stock),
        min_stock: Number(p.min_stock),
        is_active: !!p.is_active,
      };
      if (p.cost_price !== '' && p.cost_price !== null && p.cost_price !== undefined) {
        body.cost_price = String(p.cost_price);
      }

      bar.classList.add('busy');
      try {
        if (p.id) {
          await api('/api/products/' + p.id + '/', { method: 'PATCH', body });
          toast('Producto actualizado.');
        } else {
          await api('/api/products/', { method: 'POST', body });
          toast('Producto creado.');
        }
        navigate('inventario/stock');
      } catch (err) {
        bar.classList.remove('busy');
        showFormErr(errBox, apiErrorMessage(err, 'No se pudo guardar el producto.'));
      }
    }

    function afterPOCantidad() {
      const recalc = () => {
        const q = parseInt($('#po-qty').value, 10) || 0;
        const c = parseFloat($('#po-cost').value) || 0;
        $('#po-qty-total').textContent = fmtCOP(q * c);
      };
      $('#po-qty').addEventListener('input', recalc);
      $('#po-cost').addEventListener('input', recalc);
      recalc();
      setTimeout(() => $('#po-qty').select(), 50);
    }

    function poAcceptQty() {
      const p = state.poCart.pending_product;
      if (!p) return;
      const errBox = $('#po-qty-error');
      const q = parseInt($('#po-qty').value, 10);
      const c = parseFloat($('#po-cost').value);
      errBox.hidden = true;
      if (!q || q < 1)  return showFormErr(errBox, 'La cantidad debe ser ≥ 1.');
      if (!c || c <= 0) return showFormErr(errBox, 'El costo unitario debe ser mayor a 0.');

      const existing = state.poCart.items.find(it => it.product_id === p.id);
      if (existing) {
        existing.quantity += q;
        existing.unit_cost = c;  // last entered cost wins
      } else {
        state.poCart.items.push({
          product_id: p.id, name: p.name,
          unit_cost: c, quantity: q,
        });
      }
      state.poCart.pending_product = null;
      navigate('inventario/pedidos/realizar/carrito');
    }

    function poRemoveItem(idx) {
      state.poCart.items.splice(idx, 1);
      render();
    }

    async function submitPurchaseOrder() {
      const c = state.poCart;
      const errBox = $('#po-error');
      const bar    = $('#po-confirm');
      errBox.hidden = true;
      if (!c.supplier) return showFormErr(errBox, 'Selecciona un proveedor.');
      if (c.items.length === 0) return showFormErr(errBox, 'Agrega al menos un producto.');

      bar.classList.add('busy');
      try {
        const po = await api('/api/purchase-orders/', {
          method: 'POST',
          body: {
            supplier: c.supplier.id,
            notes: c.notes || '',
            items: c.items.map(it => ({
              product: it.product_id,
              quantity: it.quantity,
              unit_cost: String(it.unit_cost),
            })),
          },
        });
        state.poCart = { supplier: null, items: [], pending_product: null, notes: '' };
        toast('Pedido OC-' + String(po.id).padStart(6, '0') + ' creado.');
        navigate('inventario/pedidos');
      } catch (err) {
        bar.classList.remove('busy');
        showFormErr(errBox, apiErrorMessage(err, 'No se pudo crear el pedido.'));
      }
    }

    function toggleRecvCheck(itemId) {
      state.poReceive.checked[itemId] = !state.poReceive.checked[itemId];
      // Patch only the affected checkbox to avoid losing scroll position
      const btn = document.querySelector(`.chk[data-id="${itemId}"]`);
      if (btn) {
        const on = !!state.poReceive.checked[itemId];
        btn.setAttribute('aria-pressed', on ? 'true' : 'false');
        btn.innerHTML = on ? ICONS.check : '';
      }
    }

    async function submitReceive() {
      const o = state.poReceive.order;
      if (!o) return;
      const errBox = $('#recv-error');
      const bar    = $('#recv-confirm');
      errBox.hidden = true;

      const total = (o.items || []).length;
      const done = Object.values(state.poReceive.checked).filter(Boolean).length;
      if (done < total) {
        if (!confirm(`Solo marcaste ${done} de ${total} productos. ¿Confirmar la recepción del pedido completo?`)) {
          return;
        }
      }

      bar.classList.add('busy');
      try {
        await api('/api/purchase-orders/' + o.id + '/receive/', { method: 'POST' });
        toast('Pedido OC-' + String(o.id).padStart(6,'0') + ' recibido. Stock actualizado.');
        state.poReceive = { order: null, checked: {} };
        navigate('inventario/pedidos');
      } catch (err) {
        bar.classList.remove('busy');
        showFormErr(errBox, apiErrorMessage(err, 'No se pudo confirmar la recepción.'));
      }
    }

    async function afterCajaIndex() {

    async function refreshCaja() {
      try {
        const data = await api('/api/cash-registers/?ordering=-opened_at&page_size=10');
        const rows = data.results || data;
        const open = rows.find(r => r.status === 'OPEN');
        state.caja.active = open || null;
        if (open) {
          try {
            state.caja.balance = await api('/api/cash-registers/' + open.id + '/balance/');
          } catch (_) { state.caja.balance = null; }
        } else {
          state.caja.balance = null;
        }
      } catch (err) {
        toast('Error al cargar caja.', 'error');
        state.caja.active = null;
      }
      if (state.route === 'caja') render();
    }

    async function submitAbrirCaja() {
      const errBox = $('#ca-error');
      const bar    = $('#ca-confirm');
      errBox.hidden = true;
      const amt = parseFloat(state.caja.opening_amount);
      if (!Number.isFinite(amt) || amt < 0) {
        return showFormErr(errBox, 'Indica un monto válido (≥ 0).');

      bar.classList.add('busy');
      try {
        await api('/api/cash-registers/', {

        <form id="caja-w-form" class="px-6 py-6 flex flex-col gap-5" novalidate>
          <div style="background: var(--lavender); border-radius: 12px; padding: 12px 16px">
            <div class="text-xs text-gray-600">Saldo disponible</div>
            <div class="text-2xl font-bold" style="color: var(--money)">${fmtCOP(available)}</div>
          </div>

          <div>
            <label class="field-label" for="cw-amount">Monto a retirar</label>
            <input id="cw-amount" name="amount" class="field-input" type="number"
                   min="0.01" step="1000" inputmode="numeric" required
                   value="${esc(c.withdraw.amount)}" placeholder="20000">
          </div>

          <div>
            <label class="field-label" for="cw-concept">Motivo del retiro</label>
            <input id="cw-concept" name="concept" class="field-input" maxlength="255" required
                   value="${esc(c.withdraw.concept)}" placeholder="Ej: Pago servicios públicos">
          </div>

          <p id="cw-error" class="field-error" hidden></p>
          <div class="confirm-bar ready" id="cw-confirm" role="group" aria-label="Confirmar retiro">
            <span class="knob" aria-hidden="true">${ICONS.chevron}</span>
            <button type="submit">Confirmar</button>
          </div>
        </form>
      `;
    }

    function afterCajaRetirar() {
      const form = $('#caja-w-form');
      form.addEventListener('input', (e) => {
        const f = e.target;
        if (f.name === 'amount' || f.name === 'concept') state.caja.withdraw[f.name] = f.value;
      });
      form.addEventListener('submit', (e) => { e.preventDefault(); submitRetiro(); });
      setTimeout(() => $('#cw-amount').focus(), 50);
    }

    async function submitRetiro() {
      const c = state.caja;
      const errBox = $('#cw-error');
      const bar    = $('#cw-confirm');
      errBox.hidden = true;
      const amt = parseFloat(c.withdraw.amount);
      if (!Number.isFinite(amt) || amt <= 0) return showFormErr(errBox, 'Indica un monto mayor a 0.');
      if (!c.withdraw.concept.trim())        return showFormErr(errBox, 'El motivo es requerido.');
      bar.classList.add('busy');
      try {
        const res = await api('/api/cash-registers/' + c.active.id + '/withdraw/', {
          method: 'POST',
          body: { amount: String(amt), concept: c.withdraw.concept.trim() },
        });
        state.caja.withdraw = { amount: '', concept: '' };
        toast('Retiro registrado. Nuevo saldo: ' + fmtCOP(res.new_balance));
        await refreshCaja();
        navigate('caja');
      } catch (err) {
        bar.classList.remove('busy');
        showFormErr(errBox, apiErrorMessage(err, 'No se pudo registrar el retiro.'));
      }
    }

    // ── Caja: cerrar ────────────────────────────────────────────────────────
    function viewCajaCerrar() {
      const c = state.caja;
      if (!c.active) { navigate('caja'); return ''; }
      const expected = (c.balance && c.balance.balance) ? c.balance.balance : c.active.opening_amount;
      return `
        <header class="app-header" role="banner">
          <button type="button" class="icon-btn" data-action="go" data-to="caja" aria-label="Volver">${ICONS.back}</button>
          <h1>Cerrar Caja</h1>
        </header>
        <form id="caja-c-form" class="px-6 py-6 flex flex-col gap-5" novalidate>
          <div style="background: var(--lavender); border-radius: 12px; padding: 12px 16px">
            <div class="text-xs text-gray-600">Esperado en caja (según movimientos)</div>
            <div class="text-2xl font-bold">${fmtCOP(expected)}</div>
          </div>

          <div>
            <label class="field-label" for="cc-amount">Monto real contado en efectivo</label>
            <input id="cc-amount" name="closing_amount" class="field-input" type="number"
                   min="0" step="1000" inputmode="numeric" required
                   value="${esc(c.closing_amount)}" placeholder="${Number(expected).toFixed(0)}">
            <p class="field-hint">La diferencia se calcula al cerrar.</p>
          </div>

          <p id="cc-error" class="field-error" hidden></p>
          <div class="confirm-bar ready" id="cc-confirm" role="group" aria-label="Confirmar cierre">
            <span class="knob" aria-hidden="true">${ICONS.chevron}</span>
            <button type="submit">Cerrar caja</button>
          </div>
        </form>
      `;
    }

    function afterCajaCerrar() {
      const form = $('#caja-c-form');
      form.addEventListener('input', (e) => {
        if (e.target.name === 'closing_amount') state.caja.closing_amount = e.target.value;
      });
      form.addEventListener('submit', (e) => { e.preventDefault(); submitCerrarCaja(); });
      setTimeout(() => $('#cc-amount').focus(), 50);
    }

    async function submitCerrarCaja() {
      const c = state.caja;
      const errBox = $('#cc-error');
      const bar    = $('#cc-confirm');
      errBox.hidden = true;
      const amt = parseFloat(c.closing_amount);
      if (!Number.isFinite(amt) || amt < 0) return showFormErr(errBox, 'Indica un monto válido (≥ 0).');
      bar.classList.add('busy');
      try {
        const closed = await api('/api/cash-registers/' + c.active.id + '/close/', {
          method: 'POST',
          body: { closing_amount: String(amt) },
        });
        state.caja.closing_amount = '';
        state.caja.lastClosed = closed;
        state.caja.active = null;
        state.caja.balance = null;
        const diff = Number(closed.difference);
        const msg = diff === 0
          ? 'Caja cerrada sin diferencias.'
          : (diff > 0 ? 'Cierre con sobrante de ' + fmtCOP(diff) : 'Cierre con faltante de ' + fmtCOP(Math.abs(diff)));
        toast(msg);
        navigate('caja');
      } catch (err) {
        bar.classList.remove('busy');
        showFormErr(errBox, apiErrorMessage(err, 'No se pudo cerrar la caja.'));
      }
    }

    // ── Caja: historial ─────────────────────────────────────────────────────
    function viewCajaHistorial() {
      const h = state.caja.history;
      let body;
      if (h === null) {
        body = '<p class="text-center text-gray-500 py-6 text-sm">Cargando…</p>';
      } else if (!h.length) {
        body = '<p class="text-center text-gray-500 py-6 text-sm">Sin cierres registrados.</p>';
      } else {
        body = h.map(r => {
          const diff = Number(r.difference ?? 0);
          const dCls = diff === 0 ? '' : (diff > 0 ? 'positive' : 'negative');
          const opened = new Date(r.opened_at);
          const closed = r.closed_at ? new Date(r.closed_at) : null;
          const span = (d) => d.toLocaleString('es-CO', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit', hour12: false });
          return `
            <div class="border-b border-gray-200 py-3">
              <div class="flex items-center justify-between">
                <div>
                  <div class="font-semibold">Caja #${r.id}</div>
                  <div class="text-xs text-gray-500">${esc(span(opened))} → ${closed ? esc(span(closed)) : '—'}</div>
                </div>
                <span class="status-pill ${r.status === 'OPEN' ? 'open' : 'closed'}">${esc(r.status === 'OPEN' ? 'Abierta' : 'Cerrada')}</span>
              </div>
              ${r.status === 'CLOSED' ? `
                <div class="kpi-grid mt-3">
                  <div class="kpi"><div class="lbl">Esperado</div><div class="val">${fmtCOP(r.expected_amount)}</div></div>
                  <div class="kpi"><div class="lbl">Contado</div><div class="val">${fmtCOP(r.closing_amount)}</div></div>
                  <div class="kpi diff ${dCls}" style="grid-column: span 2">
                    <div class="lbl">Diferencia</div>
                    <div class="val">${fmtCOP(diff)}</div>
                  </div>
                </div>
              ` : ''}
            </div>
          `;
        }).join('');
      }
      return `
        <header class="app-header" role="banner">
          <button type="button" class="icon-btn" data-action="go" data-to="caja" aria-label="Volver">${ICONS.back}</button>
          <h1>Historial de Caja</h1>
        </header>
        <section class="px-4 py-4">${body}</section>
      `;
    }

    async function afterCajaHistorial() {
      state.caja.history = null;
      try {
        const data = await api('/api/cash-registers/?ordering=-opened_at&page_size=30');
        state.caja.history = data.results || data;
      } catch (err) {
        state.caja.history = [];
        toast('Error al cargar historial.', 'error');
      }
      if (state.route === 'caja/historial') render();
    }

    function viewStub(title) {
      return `
        <header class="app-header" role="banner">
          <button type="button" class="icon-btn" data-action="go" data-to="menu" aria-label="Menú principal">
            ${ICONS.home}
          </button>
          <h1>${esc(title)}</h1>
        </header>
        <section class="px-6 py-10 text-center">
          <p class="text-base text-gray-600">Esta sección aún no está implementada.</p>
          <p class="text-sm text-gray-400 mt-2">Próximamente.</p>
        </section>
      `;
    }

    // ── Bindings (after render) ──────────────────────────────────────────────
    function afterLogin() {
      const form = $('#login-form');
      const user = $('#login-user');
      const password = $('#login-password');
      const errBox = $('#login-error');
      const btn = $('#login-btn');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errBox.hidden = true;
        errBox.textContent = '';

        const username = user.value.trim();
        const pwd = password.value;

        if (!username) {
          errBox.textContent = 'Ingresa tu usuario.';
          errBox.hidden = false;
          user.focus();
          return;
        }
        if (pwd.length < 6) {
          errBox.textContent = 'La contraseña debe tener al menos 6 caracteres.';
          errBox.hidden = false;
          password.focus();
          return;
        }

        btn.disabled = true;
        btn.textContent = 'Ingresando…';
        try {
          const data = await api('/api/token/', {
            method: 'POST',
            body: { username, password: pwd },
          });
          localStorage.setItem(TOKEN_KEY, data.access);
          localStorage.setItem(REFRESH_KEY, data.refresh);
          if (data.user) {
            state.user = data.user.username || username;
            state.role = data.user.role || null;
            state.fullName = data.user.full_name || data.user.username || username;
            localStorage.setItem(USER_KEY, state.user);
            if (state.role)     localStorage.setItem(ROLE_KEY, state.role);
            if (state.fullName) localStorage.setItem(FULLNAME_KEY, state.fullName);
          } else {
            state.user = username;
            localStorage.setItem(USER_KEY, username);
          }
          navigate('menu');
        } catch (err) {
          let msg = 'No se pudo iniciar sesión.';
          if (err.status === 401) msg = 'Usuario o contraseña incorrectos.';
          else if (err.status === 423) msg = 'Cuenta bloqueada temporalmente. Intenta en 30 minutos.';
          else if (err.data && err.data.detail) msg = err.data.detail;
          errBox.textContent = msg;
          errBox.hidden = false;
          toast(msg, 'error');
        } finally {
          btn.disabled = false;
          btn.textContent = 'Iniciar sesión';
        }
      });

      setTimeout(() => user.focus(), 50);
    }

    function logout() {
      const refresh = localStorage.getItem(REFRESH_KEY);
      if (refresh) {
        api('/api/token/logout/', { method: 'POST', body: { refresh } }).catch(() => {});
      }
      [TOKEN_KEY, REFRESH_KEY, USER_KEY, ROLE_KEY, FULLNAME_KEY].forEach(k => localStorage.removeItem(k));
      state.user = null; state.role = null; state.fullName = null;
      navigate('login');
    }

    // ── Router ───────────────────────────────────────────────────────────────
    const ROUTES = {
      menu:             { view: viewMenu,                   needsAuth: true,  after: null },
      login:            { view: viewLogin,                  needsAuth: false, after: afterLogin },
      personas:                     { view: viewPersonasIndex,    needsAuth: true, after: null },
      'personas/nuevo-cliente':     { view: viewNuevoCliente,     needsAuth: true, after: afterNuevoCliente },
      'personas/nuevo-empleado':    { view: viewNuevoEmpleado,    needsAuth: true, after: afterNuevoEmpleado },
      ventas:             { view: viewVentasIndex,                  needsAuth: true, after: afterVentasIndex },
      'ventas/carrito':           { view: viewCarrito,              needsAuth: true, after: null },
      'ventas/buscar-producto':   { view: viewBuscarProducto,       needsAuth: true, after: afterBuscarProducto },
      'ventas/cantidad':          { view: viewCantidad,             needsAuth: true, after: afterCantidad },
      'ventas/confirmar':         { view: viewConfirmarVenta,       needsAuth: true, after: afterConfirmarVenta },
      'emitir-factura':              { view: viewFacturaFiltro,     needsAuth: true, after: afterFacturaFiltro },
      'emitir-factura/resultados':   { view: viewFacturaResultados,  needsAuth: true, after: afterFacturaResultados },
      'emitir-factura/preview':      { view: viewFacturaPreview,     needsAuth: true, after: null },
      inventario:                   { view: viewInventarioIndex,  needsAuth: true, after: null },
      'inventario/stock':           { view: viewStockList,        needsAuth: true, after: afterStockList },
      'inventario/stock/filtros':   { view: viewStockFilters,     needsAuth: true, after: afterStockFilters },
      'inventario/stock/nuevo':     { view: viewProductForm,      needsAuth: true, after: afterProductForm },
      'inventario/stock/editar':    { view: viewProductForm,      needsAuth: true, after: afterProductForm },
      'inventario/pedidos':                          { view: viewPedidosIndex,        needsAuth: true, after: null },
      'inventario/pedidos/realizar':                 { view: viewSelectSupplier,      needsAuth: true, after: afterSelectSupplier },
      'inventario/pedidos/realizar/carrito':         { view: viewPOCarrito,           needsAuth: true, after: null },
      'inventario/pedidos/realizar/buscar-producto': { view: viewPOBuscarProducto,    needsAuth: true, after: afterPOBuscarProducto },
      'inventario/pedidos/realizar/cantidad':        { view: viewPOCantidad,          needsAuth: true, after: afterPOCantidad },
      'inventario/pedidos/recibir':                  { view: viewSelectPOForReceive,  needsAuth: true, after: afterSelectPOForReceive },
      'inventario/pedidos/recibir/detalle':          { view: viewPOReceiveDetail,     needsAuth: true, after: null },
      'inventario/pedidos/nuevo-proveedor':          { view: viewNuevoProveedor,      needsAuth: true, after: afterNuevoProveedor },
      proveedores:      { view: () => { navigate('inventario/pedidos'); return ''; }, needsAuth: true, after: null },
      caja:               { view: viewCajaIndex,      needsAuth: true, after: afterCajaIndex },
      'caja/abrir':       { view: viewCajaAbrir,      needsAuth: true, after: afterCajaAbrir },
      'caja/retirar':     { view: viewCajaRetirar,    needsAuth: true, after: afterCajaRetirar },
      'caja/cerrar':      { view: viewCajaCerrar,     needsAuth: true, after: afterCajaCerrar },
      'caja/historial':   { view: viewCajaHistorial,  needsAuth: true, after: afterCajaHistorial },
    };

    function currentRoute() {
      const raw = (window.location.hash || '').replace(/^#\//, '');
      return raw || (localStorage.getItem(TOKEN_KEY) ? 'menu' : 'login');
    }

    function render() {
      const app = $('#app');
      let route = currentRoute();
      if (!ROUTES[route]) route = 'menu';
      const token = localStorage.getItem(TOKEN_KEY);

      if (ROUTES[route].needsAuth && !token) {
        route = 'login';
      } else if (route === 'login' && token) {
        route = 'menu';
      }

      state.route = route;
      app.innerHTML = ROUTES[route].view();
      window.scrollTo(0, 0);
      const after = ROUTES[route].after;
      if (typeof after === 'function') after();
    }

    function navigate(route) {
      if (window.location.hash === '#/' + route) {
        render();
      } else {
        window.location.hash = '#/' + route;
      }
    }

    window.addEventListener('hashchange', render);

    // ── Event delegation ─────────────────────────────────────────────────────
    document.addEventListener('click', (e) => {
      const el = e.target.closest('[data-action]');
      if (!el) return;
      const action = el.dataset.action;
      e.preventDefault();
      switch (action) {
        case 'go':                navigate(el.dataset.to); break;
        case 'logout':            logout(); break;
        case 'clear-search': {
          const target = $('#' + el.dataset.target);
          if (target) { target.value = ''; target.dispatchEvent(new Event('input')); target.focus(); }
          break;
        }
        case 'sale-anonymous':    cartGoAnonymous(); break;
        case 'select-customer':   cartSelectCustomer(parseInt(el.dataset.id, 10)); break;
        case 'pick-product':      cartPickProduct(parseInt(el.dataset.id, 10)); break;
        case 'accept-qty':        cartAcceptQty(); break;
        case 'remove-item':       cartRemoveItem(parseInt(el.dataset.idx, 10)); break;
        case 'go-confirm':        cartGoConfirm(); break;
        case 'submit-sale':       cartSubmitSale(); break;
        case 'search-sales':      searchSalesForInvoice(); break;
        case 'pick-sale':         pickSaleForInvoice(parseInt(el.dataset.id, 10)); break;
        case 'emit-and-download': emitAndDownloadInvoice(); break;
        case 'open-doc-type':     openDocTypeSheet(el.dataset.target); break;
        case 'toggle-day':        toggleEmpleadoDay(parseInt(el.dataset.day, 10)); break;
        case 'new-product':       startNewProduct(); break;
        case 'edit-product':      loadProductForEdit(parseInt(el.dataset.id, 10)); break;
        case 'open-cat-filter':   openCategoryFilterSheet(); break;
        case 'open-cat-product':  openCategoryProductSheet(); break;
        case 'reset-filters':     resetFiltersInPlace(); break;
        case 'clear-filters':     clearStockFilters(); break;
        case 'stock-step':        stepStock('stock', parseInt(el.dataset.delta, 10)); break;
        case 'min-step':          stepStock('min_stock', parseInt(el.dataset.delta, 10)); break;
        case 'start-po':          startPurchaseOrder(); break;
        case 'pick-supplier':     pickSupplier(parseInt(el.dataset.id, 10)); break;
        case 'po-pick-product':   poPickProduct(parseInt(el.dataset.id, 10)); break;
        case 'po-accept-qty':     poAcceptQty(); break;
        case 'po-remove-item':    poRemoveItem(parseInt(el.dataset.idx, 10)); break;
        case 'submit-po':         submitPurchaseOrder(); break;
        case 'pick-po':           pickPOForReceive(parseInt(el.dataset.id, 10)); break;
        case 'toggle-recv':       toggleRecvCheck(parseInt(el.dataset.id, 10)); break;
        case 'submit-receive':    submitReceive(); break;
        case 'refresh-caja':      refreshCaja(); break;
      }
    });

    // ── Boot ─────────────────────────────────────────────────────────────────
    render();
  </script>
</body>
</html>
